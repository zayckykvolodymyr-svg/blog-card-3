<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Card</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<img src="blog-image.png" alt="Blog image" class="card__image">

<div class="card__content">

<div class="card__meta">
<span class="card__category">Категорія</span>
<span class="card__date">06 березня 2026</span>
</div>

<h3 class="card__title">Заголовок блогу</h3>

<p class="card__description">
Короткий опис блогу...
</p>

<div class="card__author">
<img src="avatar-male.png" alt="Author" class="card__author-image">
<span class="card__author-name">Ім'я Автора</span>
</div>

</div>
</div>

</body>
</html>
